spring:
  application:
    name: archiver-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/archiver?stringtype=unspecified
    username: archiver
    password: archiver
    hikari:
      maximum-pool-size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

server:
  port: 8080

spring.ai.mcp.server:
  name: archiver
  version: "1.0.0"
  type: SYNC
  protocol: STREAMABLE
  streamable-http:
    mcp-endpoint: /api/mcp/sse

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

archiver:
  storage:
    root: ${ARCHIVER_STORAGE_ROOT:/tmp/archiver-storage}
  processor:
    token: ${ARCHIVER_PROCESSOR_TOKEN:dev-processor-token}
  openai:
    api-key: ${OPENAI_API_KEY:}
  embed:
    tei-url: ${EMBED_TEI_URL:}
    tei-key: ${EMBED_TEI_KEY:}
  translate-worker:
    url: ${TRANSLATE_WORKER_URL:http://translate-worker:8001}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  ocr:
    default-engine: ${OCR_DEFAULT_ENGINE:ocr_page_qwen3vl}
    qwen:
      enabled: ${QWEN_OCR_ENABLED:false}
      base-url: ${QWEN_BASE_URL:https://api.deepinfra.com/v1/openai}
      api-key: ${QWEN_API_KEY:}
      model: ${QWEN_OCR_MODEL:Qwen/Qwen2.5-VL-32B-Instruct}
      poll-interval: ${QWEN_OCR_POLL_INTERVAL:5000}
      concurrency: ${QWEN_OCR_CONCURRENCY:1}
    claude:
      enabled: ${CLAUDE_OCR_ENABLED:false}
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${CLAUDE_OCR_MODEL:claude-haiku-4-5-20251001}
      poll-interval: ${CLAUDE_OCR_POLL_INTERVAL:5000}
      concurrency: ${CLAUDE_OCR_CONCURRENCY:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/archiver_dev?stringtype=unspecified
    username: archiver
    password: archiver

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DATASOURCE_POOL_SIZE:30}

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://localhost:5432/archiver_test?stringtype=unspecified
    username: archiver
    password: archiver

  flyway:
    clean-disabled: false
